<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="style.css">
    <script src="./scripts.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <img src="./assets/logo.gif" alt="logo-dinheiro" class="logo-image">
    </header>

   <main>
        <label>
            Converter <b>de</b>
            <select>
                <option> R$ Real Brasileiro </option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar"> US$ Dólar  Americano </option>
                <option value="euro"> € Euro </option>
            </select>
        </label>

       <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00">
       </label>

       <button class="convert-button"> Converter </button>

       <section>
            <div class="currency-box">
                <img src="./assets/Real.png" alt="logo-moeda-br" class="currency-img">
                <p class="currency"> Real </p>
                <p class="currency-value-to-convert" > <b>R$ 0,00</b> </p>
            </div>

        
            <img src="./assets/seta.png" alt="logo-seta" class="arrow-img">
        

            <div class="currency-box">
                <img src="./assets/dolar.png" alt="logo-moeda-EUA" class="currency-img2"> 
                <p class="currency" id="currency-name"> Dólar Americano </p>
                <p class="currency-value"> <b>US$ 0,00</b> </p>
            </div>
       </section>

    </main>

    
</body>
</html>
